services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes: ["./backend:/app"]
    command: bash -c "pip install -r requirements.txt && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports: ["8000:8000"]
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes: ["./frontend:/app"]
    command: sh -c "npm install && npm run dev"
    ports: ["5173:5173"]
    environment:
      - VITE_API_URL=http://localhost:8000
